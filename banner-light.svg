<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 280" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Lattix Zero Trust runtime — operational status readout">
  <defs>
    <pattern id="gEL" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#EAEAEA" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="scanEL" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#B08800" stop-opacity="0"/>
      <stop offset="50%" stop-color="#B08800" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#B08800" stop-opacity="0"/>
    </linearGradient>
    <style>
      .m { font-family: "IBM Plex Mono","JetBrains Mono","Courier New",monospace; }
      .border { fill: #B08800; font-size: 14px; }
      .wm { fill: #B08800; font-size: 14px; font-weight: 600; }
      .dim { fill: #8A8A8A; font-size: 12px; letter-spacing: 1px; }
      .label { fill: #1F1F1F; font-size: 12px; letter-spacing: 1px; }
      .ok { fill: #8A6A00; font-size: 12px; letter-spacing: 1px; font-weight: 600; }
    </style>
  </defs>

  <rect width="1280" height="280" fill="#FAFAFA"/>
